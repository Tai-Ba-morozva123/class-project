<!DOCTYPE html>

<head>
    <style>
        
 h1 {
            text-decoration: underline overline;
            text-transform: none;
        }
        h2 {
            text-decoration: line-through;
            text-transform: uppercase;
        }

        h3 {
            text-decoration: underline;
            text-transform: lowercase;
        }

       
        h4 {
            text-decoration: overline;
            text-transform: capitalize;
        }
    </style>
</head>

<body>
    <h1>About Penguin</h1>
    <h2>There are 19 species, or types, of penguins</h2>
    <h3>actually it's 18</h3>
    <h4>They are found mainly in the southern half of the world. Many types are found in the cold regions of Antarctica or nearby islands.</h4>
</body>
