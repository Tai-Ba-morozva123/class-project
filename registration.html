<body>
      <b>Government Azizul Hoque College</b>

        <fieldset>
            <legend>School Registration Form:</legend>

            <input type="radio" id="gender" value="Female">Female<br>
            <input type="radio" id="gender" value="male">male<br><br>
            <label>Birthday:</label>
            <input type="date" id="Birthday" name="birthday"><br><br>
            <label>Parent's name(Father):</label>
            <input type="text" id="frame" placeholder="Enter Name"><br><br>
            <label>Parent's name(Mother):</label>
            <input type="text" id="frame" placeholder="Enter Name"><br><br>
            <label>Parents Phone number:</label> 
            <input type="text" id="number"><br><br>
            <label>Address:</label>
            <input type="text" id="frame" placeholder="Enter Address"><br><br>
            <label>Course name:</label>
            <input type="text" id="frame" placeholder="Enter Name"><br><br>
            <label>Form of payment:</label><br>
            <input type="radio" id="payment" value="Card">Card<br>
            <input type="radio" id="payment" value="Cash">Cash<br><br>
            <label>Student Signature:</label>
            <input type="text" id="frame" placeholder="Signature"><br><br>
            <label>Parent's Signature:</label>
            <input type="text" id="frame" placeholder="Signature"><br><br>
            <label>Principal Signature:</label>
            <input type="text" id="frame" placeholder="Signature"><br><br>
        </fieldset>
    </form>
