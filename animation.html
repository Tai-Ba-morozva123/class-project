<!DOCTYPE html>
<html>

<head>
    <style>
        /* The animation code& */
        @keyframes example {
            0% {
                background-color: rgb(91, 139, 179);
            }

            25% {
                background-color: rgb(30, 74, 193);
            }

            50% {
                background-color: rgb(15, 218, 207);
            }

            100% {
                background-color: rgb(219, 101, 184);
            }
        }

        /* The element to apply the animation to */
        div {
            width: 100px;
            height: 100px;
            background-color: rgb(135, 79, 202);
            animation-name: example;
            animation-duration: 4s;
        }
    </style>
</head>

</html>
